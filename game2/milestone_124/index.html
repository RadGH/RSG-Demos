<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Roguelike</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #game {
      position: fixed;
      top: 0; left: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000;
    }
    canvas { image-rendering: auto; display: block; }
  </style>
  <script>
    // Size #game to the actual visual viewport (accounts for iOS browser chrome)
    function sizeGameContainer() {
      const el = document.getElementById('game');
      if (!el) return;
      const vvp = window.visualViewport;
      const w = vvp ? Math.round(vvp.width)  : window.innerWidth;
      const h = vvp ? Math.round(vvp.height) : window.innerHeight;
      const t = vvp ? Math.round(vvp.offsetTop)  : 0;
      const l = vvp ? Math.round(vvp.offsetLeft) : 0;
      el.style.width  = w + 'px';
      el.style.height = h + 'px';
      el.style.top    = t + 'px';
      el.style.left   = l + 'px';
    }
    // Run immediately so Phaser reads correct parent size
    document.addEventListener('DOMContentLoaded', sizeGameContainer);
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', sizeGameContainer);
    }
    window.addEventListener('resize', sizeGameContainer);
  </script>
  <script type="module" crossorigin src="./assets/index-Dkw3lA_S.js"></script>
</head>
<body>
  <div id="game"></div>
</body>
</html>
