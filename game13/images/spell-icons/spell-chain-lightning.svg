  <circle cx="29" cy="26" r="1.5" stroke="currentColor" stroke-width="1"/>
  <line x1="22" y1="24" x2="27" y2="19" stroke="currentColor" stroke-width="0.75"/>
  <line x1="27" y1="19" x2="29" y2="26" stroke="currentColor" stroke-width="0.75"/>
</svg>
