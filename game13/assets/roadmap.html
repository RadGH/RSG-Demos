<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="rsg-game" content="Emberveil">
  <title>Emberveil — Roadmap</title>
  <link rel="stylesheet" href="./_tool-styles.css">
  <style>
    .rm-intro { color: var(--muted); font-size: 13px; margin-bottom: 24px; max-width: 600px; }
    .rm-section-label {
      font-family: var(--font-display); font-size: 11px; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--muted);
      border-bottom: 1px solid var(--border); padding-bottom: 4px;
      margin: 28px 0 12px;
    }
    .rm-milestone {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); margin-bottom: 12px; overflow: hidden;
    }
    .rm-milestone.shipped { border-color: rgba(64,168,96,0.3); }
    .rm-milestone.upcoming { border-color: rgba(232,160,32,0.2); }
    .rm-header {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px; cursor: pointer;
      transition: background 0.15s;
    }
    .rm-header:hover { background: var(--card-h); }
    .rm-status-icon {
      width: 20px; height: 20px; flex-shrink: 0;
    }
    .rm-mnum {
      font-family: var(--font-display); font-size: 14px;
      color: var(--gold-bright); flex-shrink: 0;
    }
    .rm-mtitle {
      font-size: 13px; color: var(--text); flex: 1;
    }
    .rm-progress-wrap {
      display: flex; align-items: center; gap: 8px; flex-shrink: 0;
    }
    .rm-progress-bar {
      width: 80px; height: 6px; background: rgba(255,255,255,0.08);
      border-radius: 3px; overflow: hidden;
    }
    .rm-progress-fill {
      height: 100%; border-radius: 3px;
      background: linear-gradient(90deg, #40a860, #60c890);
      transition: width 0.3s;
    }
    .rm-progress-fill.partial { background: linear-gradient(90deg, #e08020, #f0b040); }
    .rm-progress-fill.none { background: rgba(255,255,255,0.1); }
    .rm-progress-label {
      font-size: 11px; color: var(--muted); white-space: nowrap;
    }
    .rm-chevron {
      width: 12px; height: 12px; flex-shrink: 0; color: var(--muted);
      transition: transform 0.2s;
    }
    .rm-milestone.open .rm-chevron { transform: rotate(90deg); }
    .rm-body {
      display: none; padding: 4px 16px 14px;
      border-top: 1px solid rgba(232,160,32,0.08);
    }
    .rm-milestone.open .rm-body { display: block; }
    .rm-item {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
      font-size: 12px; line-height: 1.45;
    }
    .rm-item:last-child { border-bottom: none; }
    .rm-item-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 3px;
    }
    .rm-item-dot.done    { background: #40a860; }
    .rm-item-dot.wip     { background: #e08020; }
    .rm-item-dot.todo    { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2); }
    .rm-item-dot.dropped { background: rgba(255,255,255,0.08); }
    .rm-item-text { color: var(--text); flex: 1; }
    .rm-item-text.dropped { text-decoration: line-through; color: var(--muted); }
    .rm-item-tag { font-size: 10px; color: var(--muted); flex-shrink: 0; }
  </style>
  <script src="./_header.js" defer></script>
<script src="./_footer.js" defer></script>
</head>
<body>
  <h1>Roadmap</h1>
  <p class="rm-intro">
    Shipped milestones are shown first. Upcoming milestones are in chronological order.
    All items are drawn from the active workplan in wishlist.html.
  </p>

  <div id="rm-content">
    <div style="color:var(--muted);font-size:13px;text-align:center;padding:32px">Loading roadmap...</div>
  </div>

  <script>
  (async () => {
    const content = document.getElementById('rm-content');

    let data;
    try {
      const r = await fetch('./roadmap.json');
      data = r.ok ? await r.json() : null;
    } catch (_) { data = null; }

    if (!data || !data.milestones || data.milestones.length === 0) {
      content.innerHTML = '<div style="color:var(--muted);font-size:13px;text-align:center;padding:32px">No roadmap data available.</div>';
      return;
    }

    const shipped = data.milestones.filter(m => m.shipped);
    const upcoming = data.milestones.filter(m => !m.shipped);

    function statusIcon(m) {
      if (m.shipped) {
        return `<svg class="rm-status-icon" viewBox="0 0 20 20" fill="none">
          <circle cx="10" cy="10" r="9" fill="rgba(64,168,96,0.15)" stroke="#40a860" stroke-width="1.5"/>
          <path d="M6 10l3 3 5-5" stroke="#40a860" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>`;
      }
      if (m.doneCount > 0) {
        return `<svg class="rm-status-icon" viewBox="0 0 20 20" fill="none">
          <circle cx="10" cy="10" r="9" fill="rgba(224,128,32,0.12)" stroke="#e08020" stroke-width="1.5"/>
          <circle cx="10" cy="10" r="3" fill="#e08020"/>
        </svg>`;
      }
      return `<svg class="rm-status-icon" viewBox="0 0 20 20" fill="none">
        <circle cx="10" cy="10" r="9" fill="rgba(232,160,32,0.06)" stroke="rgba(232,160,32,0.3)" stroke-width="1.5" stroke-dasharray="3 2"/>
      </svg>`;
    }

    function renderMilestones(list) {
      return list.map(m => {
        const pct = m.total > 0 ? Math.round((m.doneCount / m.total) * 100) : 0;
        const fillClass = pct === 100 ? '' : pct > 0 ? 'partial' : 'none';
        const itemsHtml = (m.items || []).map(item => `
          <div class="rm-item">
            <div class="rm-item-dot ${item.status}"></div>
            <span class="rm-item-text ${item.status === 'dropped' ? 'dropped' : ''}">${item.label}</span>
            ${item.tag ? `<span class="rm-item-tag">${item.tag}</span>` : ''}
          </div>
        `).join('');

        return `
          <div class="rm-milestone ${m.shipped ? 'shipped' : 'upcoming'}">
            <div class="rm-header" role="button" tabindex="0" aria-expanded="false">
              ${statusIcon(m)}
              <span class="rm-mnum">${m.milestone ? 'M' + m.milestone : '?'}</span>
              <span class="rm-mtitle">${m.title}</span>
              <div class="rm-progress-wrap">
                <div class="rm-progress-bar">
                  <div class="rm-progress-fill ${fillClass}" style="width:${pct}%"></div>
                </div>
                <span class="rm-progress-label">${m.doneCount} / ${m.total}</span>
              </div>
              <svg class="rm-chevron" viewBox="0 0 12 12" fill="none">
                <path d="M4 2l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </div>
            <div class="rm-body">${itemsHtml}</div>
          </div>
        `;
      }).join('');
    }

    let html = '';
    if (shipped.length > 0) {
      html += `<div class="rm-section-label">Shipped</div>`;
      html += renderMilestones(shipped);
    }
    if (upcoming.length > 0) {
      html += `<div class="rm-section-label">Upcoming</div>`;
      html += renderMilestones(upcoming);
    }

    content.innerHTML = html;

    // Accordion toggle
    content.querySelectorAll('.rm-header').forEach(header => {
      const toggle = () => {
        const block = header.closest('.rm-milestone');
        const open = block.classList.toggle('open');
        header.setAttribute('aria-expanded', String(open));
      };
      header.addEventListener('click', toggle);
      header.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(); } });
    });

    // Auto-open the first upcoming milestone
    const firstUpcoming = content.querySelector('.rm-milestone.upcoming');
    if (firstUpcoming) {
      firstUpcoming.classList.add('open');
      firstUpcoming.querySelector('.rm-header')?.setAttribute('aria-expanded', 'true');
    }
  })();
  </script>
</body>
</html>
