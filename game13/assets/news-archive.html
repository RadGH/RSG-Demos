<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="rsg-game" content="Emberveil">
<title>News Archive — Emberveil</title>
<script src="./_header.js" defer></script>
<link rel="stylesheet" href="./_shared-styles.css">
<link rel="stylesheet" href="./_tool-styles.css">
<style>
  body { padding: 1rem 1rem 4rem; }
  .wrap { max-width: 860px; margin: 0 auto; }

  h1 {
    font-family: 'Cinzel', Georgia, serif;
    font-size: clamp(1.3rem, 4vw, 1.8rem);
    font-weight: 900; letter-spacing: 0.1em; text-transform: uppercase;
    background: linear-gradient(180deg, #f8d880 0%, #e8a040 40%, #c04030 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    margin: 0 0 0.25rem;
  }
  p.sub { color: var(--muted); font-size: 0.82rem; margin: 0 0 1.5rem; }

  .filter-bar {
    display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.25rem;
    align-items: center;
  }
  .filter-bar label {
    font-size: 0.75rem; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted); margin-right: 0.25rem;
  }
  .filter-btn {
    padding: 0.3rem 0.85rem; font: inherit; font-size: 0.78rem;
    border: 1px solid var(--border); border-radius: 20px;
    cursor: pointer; background: var(--card); color: var(--muted);
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }
  .filter-btn.active,
  .filter-btn:hover {
    background: var(--accent); border-color: var(--accent); color: #fff;
  }

  .news-list { display: flex; flex-direction: column; gap: 1rem; }

  .news-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.1rem;
    transition: border-color 0.15s, transform 0.15s;
  }
  .news-card:hover { border-color: var(--accent); transform: translateY(-1px); }

  .news-meta {
    display: flex; align-items: center; gap: 0.6rem;
    margin-bottom: 0.45rem;
  }
  .news-cat {
    font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; padding: 2px 7px; border-radius: 4px;
    border: 1px solid transparent;
  }
  .cat-release    { background: rgba(60,180,100,0.12); color: #60d880; border-color: rgba(60,180,100,0.3); }
  .cat-dev-diary  { background: rgba(80,130,220,0.12); color: #80aaff; border-color: rgba(80,130,220,0.3); }
  .cat-event      { background: rgba(200,90,200,0.12); color: #d880d8; border-color: rgba(200,90,200,0.3); }

  .news-date { font-size: 0.72rem; color: var(--muted); }

  .news-title {
    font-family: 'Cinzel', Georgia, serif;
    font-size: 1rem; font-weight: 700;
    color: var(--gold-bright, #f8d880);
    margin: 0 0 0.4rem;
    line-height: 1.35;
  }
  .news-summary {
    font-size: 0.84rem; color: var(--text); line-height: 1.55;
    opacity: 0.88;
  }

  .empty-state {
    text-align: center; padding: 3rem 1rem;
    color: var(--muted); font-size: 0.88rem;
  }
  .loading { color: var(--muted); font-size: 0.88rem; padding: 1.5rem 0; }
</style>
</head>
<body>
<div class="wrap">
  <h1>News Archive</h1>
  <p class="sub">Dev diaries, releases, and events — newest first.</p>

  <div class="filter-bar">
    <label>Filter:</label>
    <button class="filter-btn active" data-cat="all">All</button>
    <button class="filter-btn" data-cat="release">Releases</button>
    <button class="filter-btn" data-cat="dev-diary">Dev Diaries</button>
    <button class="filter-btn" data-cat="event">Events</button>
  </div>

  <div class="news-list" id="newsList">
    <p class="loading">Loading news...</p>
  </div>
</div>

<script>
(function() {
  var activeFilter = 'all';
  var allEntries = [];

  var CAT_LABELS = {
    'release':   'Release',
    'dev-diary': 'Dev Diary',
    'event':     'Event',
  };

  function catClass(cat) {
    if (cat === 'release')   return 'cat-release';
    if (cat === 'dev-diary') return 'cat-dev-diary';
    if (cat === 'event')     return 'cat-event';
    return 'cat-release';
  }

  function renderList(entries) {
    var list = document.getElementById('newsList');
    var filtered = activeFilter === 'all'
      ? entries
      : entries.filter(function(e) { return e.category === activeFilter; });

    if (filtered.length === 0) {
      list.innerHTML = '<p class="empty-state">No news entries for this filter.</p>';
      return;
    }

    list.innerHTML = filtered.map(function(entry) {
      var catLabel = CAT_LABELS[entry.category] || entry.category;
      var catCls   = catClass(entry.category);
      return '<div class="news-card" data-cat="' + entry.category + '">' +
        '<div class="news-meta">' +
          '<span class="news-cat ' + catCls + '">' + catLabel + '</span>' +
          '<span class="news-date">' + entry.date + '</span>' +
        '</div>' +
        '<div class="news-title">' + escHtml(entry.title) + '</div>' +
        '<div class="news-summary">' + escHtml(entry.summary) + '</div>' +
      '</div>';
    }).join('');
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // Filter buttons
  document.querySelector('.filter-bar').addEventListener('click', function(e) {
    var btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    activeFilter = btn.dataset.cat;
    renderList(allEntries);
  });

  // Determine base URL for fetching news/index.json
  // This file is served from /assets/ so news/ is at ../news/
  fetch('../news/index.json')
    .then(function(r) { return r.ok ? r.json() : null; })
    .then(function(data) {
      if (!data || !Array.isArray(data.entries)) {
        document.getElementById('newsList').innerHTML =
          '<p class="empty-state">No news entries available yet.</p>';
        return;
      }
      allEntries = data.entries;
      renderList(allEntries);
    })
    .catch(function() {
      document.getElementById('newsList').innerHTML =
        '<p class="empty-state">Could not load news index.</p>';
    });
})();
</script>
</body>
</html>
