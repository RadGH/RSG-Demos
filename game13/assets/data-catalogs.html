<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="rsg-game" content="Emberveil">
<script src="./_header.js" defer></script>
<script src="./_footer.js" defer></script>
<link rel="stylesheet" href="./_shared-styles.css">
<link rel="stylesheet" href="./_tool-styles.css">
<title>Data Catalogs — Emberveil</title>
<style>
  body { padding: 1rem 1rem 4rem; }
  .wrap { max-width: 1200px; margin: 0 auto; }
  h1 {
    font-family: 'Cinzel',Georgia,serif;
    font-size: 1.4rem; margin: 0 0 0.25rem;
    letter-spacing: 0.08em; text-transform: uppercase; font-weight: 900;
    background: linear-gradient(180deg,#f8d880 0%,#e8a040 40%,#c04030 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  p.sub { color: var(--muted); font-size: 0.82rem; margin: 0 0 1rem; }
  .tabs {
    display: flex; gap: 0.35rem; flex-wrap: wrap; margin: 0 0 1rem;
    border-bottom: 1px solid var(--border, rgba(232,160,32,0.2));
    padding-bottom: 0.5rem;
  }
  .tab {
    padding: 0.45rem 0.85rem;
    background: var(--card, #1a1218);
    border: 1px solid var(--border, rgba(232,160,32,0.2));
    border-radius: 6px;
    color: var(--muted, #8a7a6a);
    font: 600 0.8rem/1 'Inter', sans-serif;
    cursor: pointer;
  }
  .tab.active {
    background: rgba(232,160,32,0.14);
    border-color: #e8a020;
    color: #e8a020;
  }
  .content { background: var(--card, #1a1218); border: 1px solid var(--border, rgba(232,160,32,0.2)); border-radius: 8px; padding: 1rem; }
  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  th, td { text-align: left; padding: 0.5rem 0.6rem; border-bottom: 1px solid rgba(255,255,255,0.05); vertical-align: top; }
  th { color: var(--gold, #e8a020); font-family: 'Cinzel', serif; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; font-size: 0.7rem; }
  tr:hover { background: rgba(232,160,32,0.03); }
  .sec-title { color: var(--gold, #e8a020); font-family: 'Cinzel', serif; font-size: 0.95rem; margin: 1rem 0 0.5rem; }
  .empty { color: var(--muted, #8a7a6a); font-style: italic; padding: 1rem; }
  code { background: rgba(255,255,255,0.05); padding: 0 0.25rem; border-radius: 2px; font-size: 0.85em; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Data Catalogs</h1>
  <p class="sub">Affixes, Encounters, Quests, Passives, Status Effects. Regenerated by <code>node scripts/generate-data-catalogs.cjs</code>.</p>
  <div class="tabs" id="tabs"></div>
  <div class="content" id="content"><div class="empty">Loading…</div></div>
</div>
<script>
const CATALOGS = [
  { id: 'affixes', label: 'Affixes' },
  { id: 'encounters', label: 'Encounters' },
  { id: 'quests', label: 'Quests' },
  { id: 'passives', label: 'Passives' },
  { id: 'status-effects', label: 'Status Effects' },
];
const tabs = document.getElementById('tabs');
const content = document.getElementById('content');
CATALOGS.forEach((c, i) => {
  const b = document.createElement('button');
  b.className = 'tab' + (i === 0 ? ' active' : '');
  b.textContent = c.label;
  b.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    b.classList.add('active');
    load(c.id);
  });
  tabs.appendChild(b);
});

async function load(id) {
  try {
    const r = await fetch(`./data/${id}.json?t=` + Date.now());
    const data = await r.json();
    content.innerHTML = renderers[id] ? renderers[id](data) : '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
  } catch (e) {
    content.innerHTML = '<div class="empty">Could not load ' + id + '.json. Run <code>node scripts/generate-data-catalogs.cjs</code> to produce it.</div>';
  }
}

const renderers = {
  affixes: (d) => {
    const row = a => `<tr><td><code>${a.id}</code></td><td>${a.name}</td><td>${a.stat}</td><td>${a.min}–${a.max}</td><td>${a.descriptor || ''}</td></tr>`;
    const tbl = (items, title) => !items.length ? '' : `
      <div class="sec-title">${title} (${items.length})</div>
      <table><thead><tr><th>ID</th><th>Name</th><th>Stat</th><th>Range</th><th>Tag</th></tr></thead>
      <tbody>${items.map(row).join('')}</tbody></table>`;
    return tbl(d.prefixes || [], 'Prefixes')
         + tbl(d.suffixes || [], 'Suffixes')
         + tbl(d.shield || [],   'Shield-only affixes');
  },
  encounters: (d) => {
    const rows = Object.values(d).sort((a,b) => (a.isBoss?1:0) - (b.isBoss?1:0) || a.id.localeCompare(b.id));
    return `<table><thead><tr><th>ID</th><th>Name</th><th>Enemy groups</th><th>Boss?</th></tr></thead>
      <tbody>${rows.map(r => `<tr><td><code>${r.id}</code></td><td>${r.name}</td><td>${r.enemyCount}</td><td>${r.isBoss ? 'Yes' : ''}</td></tr>`).join('')}</tbody></table>`;
  },
  quests: (d) => {
    const row = q => `<tr><td><code>${q.id}</code></td><td>${q.title || ''}</td><td>${q.act ?? ''}</td><td>${q.giver || ''}</td><td>${q.summary || q.target || ''}</td></tr>`;
    return `<div class="sec-title">Main Quests (${(d.main||[]).length})</div>
      <table><thead><tr><th>ID</th><th>Title</th><th>Act</th><th>Giver</th><th>Summary</th></tr></thead>
      <tbody>${(d.main||[]).map(row).join('')}</tbody></table>
      <div class="sec-title">Side Quests (${(d.side||[]).length})</div>
      <table><thead><tr><th>ID</th><th>Title</th><th>Act</th><th>Target</th><th>Reward</th></tr></thead>
      <tbody>${(d.side||[]).map(q => `<tr><td><code>${q.id}</code></td><td>${q.title || ''}</td><td>${q.act ?? ''}</td><td><code>${q.target || ''}</code></td><td></td></tr>`).join('')}</tbody></table>`;
  },
  passives: (d) => {
    const classes = Object.keys(d);
    if (!classes.length) return '<div class="empty">No passives data available. Catalog extractor may need refresh.</div>';
    return classes.map(cls => {
      const nodes = d[cls];
      return `<div class="sec-title">${cls.replace(/_/g,' ')} (${nodes.length} nodes)</div>
        <table><thead><tr><th>ID</th><th>Name</th><th>Description</th></tr></thead>
        <tbody>${nodes.map(n => `<tr><td><code>${n.id}</code></td><td>${n.name}</td><td>${n.desc}</td></tr>`).join('')}</tbody></table>`;
    }).join('');
  },
  'status-effects': (d) => {
    if (!d.length) return '<div class="empty">No status effects extracted. See <code>src/mods/statusModel.js</code>.</div>';
    return `<table><thead><tr><th>ID</th><th>Family</th></tr></thead>
      <tbody>${d.map(s => `<tr><td><code>${s.id}</code></td><td>${s.family}</td></tr>`).join('')}</tbody></table>`;
  },
};

load('affixes');
</script>
</body>
</html>
