<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="rsg-game" content="Emberveil">
<script src="./_header.js" defer></script>
<link rel="stylesheet" href="./_shared-styles.css">
<link rel="stylesheet" href="./_tool-styles.css">
<title>Dev Tools — Emberveil</title>
<style>
body { padding: 1rem 1rem 4rem; }
.wrap { max-width: 1100px; margin: 0 auto; }
h1 {
  font-family: 'Cinzel',Georgia,serif;
  font-size: 1.4rem; margin: 0 0 0.2rem;
  letter-spacing: 0.08em; text-transform: uppercase; font-weight: 900;
  background: linear-gradient(180deg,#f8d880 0%,#e8a040 40%,#c04030 100%);
  -webkit-background-clip: text; background-clip: text; color: transparent;
}
p.sub { color: var(--muted); font-size: 0.82rem; margin: 0 0 1rem; }

.tag-filter {
  display: flex; flex-wrap: wrap; gap: 0.4rem;
  background: var(--card); border: 1px solid var(--border-subtle,#2a1f30);
  border-radius: 8px; padding: 0.5rem 0.75rem; margin: 0 0 0.75rem;
  align-items: center;
}
.tag-btn {
  padding: 0.25rem 0.6rem; border: 1px solid var(--border); border-radius: 4px;
  background: var(--surface); color: var(--muted); font: inherit; font-size: 0.74rem;
  font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em;
  cursor: pointer; transition: all 0.15s;
}
.tag-btn:hover, .tag-btn.active {
  border-color: var(--gold); color: var(--gold); background: rgba(232,160,32,0.08);
}
.search-box {
  margin-left: auto;
  background: var(--surface); border: 1px solid var(--border); border-radius: 5px;
  color: var(--text); padding: 0.3rem 0.6rem; font: inherit; font-size: 0.78rem;
  min-width: 160px;
}
.search-box:focus { outline: none; border-color: var(--gold); }

/* Section headers */
.section-hdr {
  font-family: 'Cinzel',Georgia,serif; font-size: 0.72rem; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--muted);
  margin: 1rem 0 0.4rem; padding-bottom: 0.3rem;
  border-bottom: 1px solid var(--border-subtle,#2a1f30);
}

/* Tool table */
.tool-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; margin-bottom: 1rem; }
.tool-table thead th {
  background: var(--surface); color: var(--muted); font-size: 0.68rem;
  letter-spacing: 0.1em; text-transform: uppercase; padding: 0.4rem 0.6rem;
  text-align: left; border-bottom: 1px solid var(--border);
}
.tool-table tbody tr { border-bottom: 1px solid rgba(255,255,255,0.04); }
.tool-table tbody tr:hover { background: var(--card-h); }
.tool-table td { padding: 0.5rem 0.6rem; vertical-align: top; }
.td-name a {
  color: var(--gold-bright); font-weight: 600; text-decoration: none;
  font-family: 'Cinzel',Georgia,serif; font-size: 0.85rem; letter-spacing: 0.04em;
}
.td-name a:hover { color: var(--gold); text-decoration: underline; }
.td-name .coming { color: var(--muted); font-size: 0.82rem; font-family: inherit; }
.td-desc { color: var(--muted); font-size: 0.78rem; max-width: 360px; }
.tag {
  display: inline-block; padding: 1px 6px; border-radius: 3px;
  font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
  white-space: nowrap;
}
.tag-devtool  { background:rgba(100,60,200,0.2); color:#b090ff; border:1px solid rgba(100,60,200,0.35); }
.tag-admin    { background:rgba(200,60,40,0.18); color:#e08070; border:1px solid rgba(200,60,40,0.3); }
.tag-docs     { background:rgba(60,130,200,0.18); color:#80b0ff; border:1px solid rgba(60,130,200,0.3); }
.tag-catalog  { background:rgba(60,180,80,0.15); color:#60d880; border:1px solid rgba(60,180,80,0.25); }
.tag-sim      { background:rgba(200,160,20,0.15); color:#e8c840; border:1px solid rgba(200,160,20,0.25); }
.tag-coming   { background:rgba(100,100,100,0.15); color:#888; border:1px solid rgba(100,100,100,0.2); }
.td-date { color: var(--muted); font-size: 0.74rem; white-space: nowrap; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Dev Tools</h1>
  <p class="sub">All developer and content tools for Emberveil. Use the filters to narrow by category.</p>

  <div class="tag-filter">
    <button class="tag-btn active" data-tag="">All</button>
    <button class="tag-btn" data-tag="catalog">Catalog</button>
    <button class="tag-btn" data-tag="devtool">DevTool</button>
    <button class="tag-btn" data-tag="admin">Admin</button>
    <button class="tag-btn" data-tag="sim">Sim</button>
    <button class="tag-btn" data-tag="docs">Docs</button>
    <input class="search-box" type="text" id="search" placeholder="Search tools...">
  </div>

  <div id="content"></div>
</div>

<script>
let TOOLS = [];

// ─── Render ───────────────────────────────────────────────────────────────────

const contentEl = document.getElementById('content');
const searchEl  = document.getElementById('search');
const tagBtns   = document.querySelectorAll('.tag-btn');
let _activeTag  = '';

const SECTION_ORDER = ['catalog', 'devtool', 'admin', 'sim', 'docs', 'archived'];
const SECTION_LABELS = {
  catalog: 'Catalogs',
  devtool: 'Dev Tools',
  admin: 'Admin',
  sim: 'Simulation',
  docs: 'Documentation',
  archived: 'Archived / Deprecated',
};

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function tagHtml(t, coming) {
  if (coming) return `<span class="tag tag-coming">Coming soon</span>`;
  return `<span class="tag tag-${t}">${esc(t)}</span>`;
}

function render() {
  const q = searchEl.value.toLowerCase();
  const filtered = TOOLS.filter(t => {
    if (_activeTag && t.tag !== _activeTag) return false;
    if (q) {
      return [t.name, t.desc, t.tag, t.milestone].join(' ').toLowerCase().includes(q);
    }
    return true;
  });

  // Group
  const groups = {};
  for (const t of filtered) {
    if (!groups[t.tag]) groups[t.tag] = [];
    groups[t.tag].push(t);
  }

  contentEl.innerHTML = '';
  const order = _activeTag ? [_activeTag] : SECTION_ORDER;
  for (const tag of order) {
    const list = groups[tag];
    if (!list?.length) continue;
    const hdr = document.createElement('div');
    hdr.className = 'section-hdr';
    hdr.textContent = SECTION_LABELS[tag] || tag;
    contentEl.appendChild(hdr);

    const table = document.createElement('table');
    table.className = 'tool-table';
    table.innerHTML = `<thead><tr><th>Tool</th><th>Description</th><th>Tag</th><th>Milestone</th><th>Updated</th></tr></thead>`;
    const tbody = document.createElement('tbody');
    for (const t of list) {
      const tr = document.createElement('tr');
      const nameCell = t.coming
        ? `<td class="td-name"><span class="coming">${esc(t.name)}</span></td>`
        : `<td class="td-name"><a href="${esc(t.href)}">${esc(t.name)}</a></td>`;
      tr.innerHTML = `
        ${nameCell}
        <td class="td-desc">${esc(t.desc)}</td>
        <td>${tagHtml(t.tag, t.coming)}</td>
        <td style="color:var(--muted);font-size:0.76rem;">${esc(t.milestone||'')}</td>
        <td class="td-date">${t.updated || ''}</td>
      `;
      tbody.appendChild(tr);
    }
    table.appendChild(tbody);
    contentEl.appendChild(table);
  }

  if (contentEl.children.length === 0) {
    contentEl.innerHTML = '<div style="text-align:center;color:var(--muted);padding:2rem;">No tools match the current filter.</div>';
  }
}

tagBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    _activeTag = btn.dataset.tag;
    tagBtns.forEach(b => b.classList.toggle('active', b.dataset.tag === _activeTag));
    render();
  });
});
searchEl.addEventListener('input', render);
async function loadTools() {
  try {
    const r = await fetch('./data/tools.json', { cache: 'no-cache' });
    if (!r.ok) throw new Error('failed');
    const data = await r.json();
    TOOLS = (data.tools || []).map(t => ({
      ...t,
      tag: t.deprecated ? 'archived' : t.tag,
    }));
  } catch (e) {
    contentEl.innerHTML = '<div style="color:#e07050;padding:1rem;">Failed to load tools.json. Run <code>node scripts/build-tools-list.cjs</code>.</div>';
    return;
  }
  render();
}
loadTools();
</script>
</body>
</html>
