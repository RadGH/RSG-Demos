<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="rsg-game" content="Emberveil">
  <title>News — Emberveil</title>
  <script src="assets/_header.js" defer></script>
  <script src="assets/_footer.js" defer></script>
  <link rel="stylesheet" href="assets/_site-theme.css">
  <style>
    .news-archive-page {
      max-width: 860px;
      margin: 0 auto;
      padding: 2rem 1rem 4rem;
    }

    .news-archive-page h1 {
      font-family: 'Cinzel', Georgia, serif;
      font-size: clamp(1.4rem, 5vw, 2rem);
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: linear-gradient(180deg, #f8d880 0%, #e8a040 40%, #c04030 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin: 0 0 0.3rem;
    }

    .news-archive-page .page-sub {
      color: var(--rsg-muted, #8a7a6a);
      font-size: 0.84rem;
      margin: 0 0 1.75rem;
    }

    .news-filter-bar {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
      align-items: center;
    }

    .news-filter-bar .filter-label {
      font-size: 0.75rem;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--rsg-muted, #8a7a6a);
      margin-right: 0.2rem;
    }

    .filter-btn {
      padding: 0.3rem 0.9rem;
      font-family: inherit;
      font-size: 0.78rem;
      border: 1px solid var(--rsg-border, rgba(232,160,32,0.2));
      border-radius: 20px;
      cursor: pointer;
      background: var(--rsg-card, #1a1218);
      color: var(--rsg-muted, #8a7a6a);
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .filter-btn.active,
    .filter-btn:hover {
      background: var(--rsg-accent, #e8a020);
      border-color: var(--rsg-accent, #e8a020);
      color: #0a0608;
    }

    .news-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      background: none;
    }

    .news-card {
      background: var(--rsg-card, #1a1218);
      border: 1px solid var(--rsg-border, rgba(232,160,32,0.2));
      border-radius: var(--rsg-radius, 10px);
      overflow: hidden;
      transition: border-color 0.15s, transform 0.15s;
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: inherit;
    }

    .news-card:hover {
      border-color: var(--rsg-accent, #e8a020);
      transform: translateY(-2px);
    }

    .news-card-hero {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      display: block;
      background: var(--rsg-surface, #12090d);
    }

    .news-card-hero-placeholder {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: linear-gradient(135deg, var(--rsg-surface, #12090d) 0%, rgba(232,160,32,0.06) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--rsg-muted, #8a7a6a);
      font-size: 1.5rem;
    }

    .news-card-body {
      padding: 1rem 0 1rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .news-card-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .news-cat-badge {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 4px;
      border: 1px solid transparent;
    }

    .cat-release   { background: rgba(60,180,100,0.12); color: #60d880; border-color: rgba(60,180,100,0.3); }
    .cat-dev-diary { background: rgba(80,130,220,0.12); color: #80aaff; border-color: rgba(80,130,220,0.3); }
    .cat-event     { background: rgba(200,90,200,0.12); color: #d880d8; border-color: rgba(200,90,200,0.3); }

    .news-card-date {
      font-size: 0.72rem;
      color: var(--rsg-muted, #8a7a6a);
    }

    .news-card-title {
      font-family: 'Cinzel', Georgia, serif;
      font-size: 0.97rem;
      font-weight: 700;
      color: var(--rsg-gold-bright, #f8d880);
      line-height: 1.35;
      margin: 0;
    }

    .news-card-summary {
      font-size: 0.82rem;
      color: var(--rsg-text, #f0e8d8);
      line-height: 1.55;
      opacity: 0.82;
      flex: 1;
    }

    .news-card-cta {
      font-size: 0.75rem;
      color: var(--rsg-accent, #e8a020);
      letter-spacing: 0.05em;
      margin-top: 0.25rem;
    }

    .news-empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--rsg-muted, #8a7a6a);
      font-size: 0.9rem;
      grid-column: 1 / -1;
    }

    .news-loading {
      color: var(--rsg-muted, #8a7a6a);
      font-size: 0.88rem;
      padding: 2rem 0;
      grid-column: 1 / -1;
    }

    /* Pagination */
    .news-pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 2rem;
      flex-wrap: wrap;
    }

    .page-btn {
      padding: 0.4rem 0.9rem;
      font-family: inherit;
      font-size: 0.8rem;
      border: 1px solid var(--rsg-border, rgba(232,160,32,0.2));
      border-radius: 6px;
      cursor: pointer;
      background: var(--rsg-card, #1a1218);
      color: var(--rsg-muted, #8a7a6a);
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      display: inline-block;
    }

    .page-btn:hover {
      border-color: var(--rsg-accent, #e8a020);
      color: var(--rsg-accent, #e8a020);
    }

    .page-btn.active {
      background: var(--rsg-accent, #e8a020);
      border-color: var(--rsg-accent, #e8a020);
      color: #0a0608;
      font-weight: 600;
    }

    .page-btn:disabled,
    .page-btn[aria-disabled="true"] {
      opacity: 0.35;
      pointer-events: none;
    }

    .page-info {
      font-size: 0.75rem;
      color: var(--rsg-muted, #8a7a6a);
      padding: 0 0.25rem;
    }

    @media (max-width: 560px) {
      .news-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body class="ev-themed">
<div class="news-archive-page">
  <h1>News &amp; Updates</h1>
  <p class="page-sub">Dev diaries, releases, and events for Emberveil — newest first.</p>

  <div class="news-filter-bar">
    <span class="filter-label">Filter:</span>
    <button class="filter-btn active" data-cat="all" type="button">All</button>
    <button class="filter-btn" data-cat="release" type="button">Releases</button>
    <button class="filter-btn" data-cat="dev-diary" type="button">Dev Diaries</button>
    <button class="filter-btn" data-cat="event" type="button">Events</button>
  </div>

  <div class="news-grid" id="newsGrid">
    <p class="news-loading">Loading news...</p>
  </div>

  <nav class="news-pagination" id="newsPagination" aria-label="News pagination"></nav>
</div>

<script>
(function () {
  var PER_PAGE = 12;
  var allEntries = [];
  var filteredEntries = [];
  var currentPage = 1;
  var activeFilter = 'all';

  var CAT_LABELS = {
    'release':   'Release',
    'dev-diary': 'Dev Diary',
    'event':     'Event'
  };

  function catClass(cat) {
    if (cat === 'release')   return 'cat-release';
    if (cat === 'dev-diary') return 'cat-dev-diary';
    if (cat === 'event')     return 'cat-event';
    return 'cat-release';
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // Derive article href: file field (relative to news/) if present, else null.
  function articleHref(entry) {
    if (entry.file) return 'news/' + entry.file;
    return null;
  }

  function renderGrid(entries, page) {
    var grid = document.getElementById('newsGrid');
    var start = (page - 1) * PER_PAGE;
    var slice = entries.slice(start, start + PER_PAGE);

    if (slice.length === 0) {
      grid.innerHTML = '<p class="news-empty">No news entries for this filter.</p>';
      return;
    }

    grid.innerHTML = slice.map(function (entry) {
      var catLabel = CAT_LABELS[entry.category] || (entry.category || 'news');
      var catCls = catClass(entry.category);
      var href = articleHref(entry);
      var heroHtml = entry.hero
        ? '<img class="news-card-hero" src="' + escHtml(entry.hero) + '" alt="" loading="lazy">'
        : '<div class="news-card-hero-placeholder">&#x2726;</div>';
      var titleHtml = '<div class="news-card-title">' + escHtml(entry.title) + '</div>';
      var summaryHtml = entry.summary
        ? '<div class="news-card-summary">' + escHtml(entry.summary) + '</div>'
        : '';
      var ctaHtml = href ? '<div class="news-card-cta">Read more &rarr;</div>' : '';
      var bodyHtml =
        '<div class="news-card-body">' +
          '<div class="news-card-meta">' +
            '<span class="news-cat-badge ' + catCls + '">' + escHtml(catLabel) + '</span>' +
            '<span class="news-card-date">' + escHtml(entry.date || '') + '</span>' +
          '</div>' +
          titleHtml +
          summaryHtml +
          ctaHtml +
        '</div>';

      if (href) {
        return '<a class="news-card" href="' + escHtml(href) + '">' + heroHtml + bodyHtml + '</a>';
      }
      return '<div class="news-card">' + heroHtml + bodyHtml + '</div>';
    }).join('');
  }

  function renderPagination(total, page) {
    var pag = document.getElementById('newsPagination');
    var totalPages = Math.ceil(total / PER_PAGE);
    if (totalPages <= 1) { pag.innerHTML = ''; return; }

    var parts = [];

    // Prev
    if (page > 1) {
      parts.push('<a class="page-btn" href="?page=' + (page - 1) + (activeFilter !== 'all' ? '&cat=' + activeFilter : '') + '" data-page="' + (page - 1) + '">&lsaquo; Prev</a>');
    } else {
      parts.push('<span class="page-btn" aria-disabled="true">&lsaquo; Prev</span>');
    }

    // Page numbers (show max 7, with ellipsis)
    var pages = buildPageRange(page, totalPages);
    pages.forEach(function (p) {
      if (p === '...') {
        parts.push('<span class="page-info">&hellip;</span>');
      } else if (p === page) {
        parts.push('<span class="page-btn active" aria-current="page">' + p + '</span>');
      } else {
        parts.push('<a class="page-btn" href="?page=' + p + (activeFilter !== 'all' ? '&cat=' + activeFilter : '') + '" data-page="' + p + '">' + p + '</a>');
      }
    });

    // Next
    if (page < totalPages) {
      parts.push('<a class="page-btn" href="?page=' + (page + 1) + (activeFilter !== 'all' ? '&cat=' + activeFilter : '') + '" data-page="' + (page + 1) + '">Next &rsaquo;</a>');
    } else {
      parts.push('<span class="page-btn" aria-disabled="true">Next &rsaquo;</span>');
    }

    parts.push('<span class="page-info">Page ' + page + ' of ' + totalPages + '</span>');
    pag.innerHTML = parts.join('');
  }

  function buildPageRange(current, total) {
    if (total <= 7) {
      var r = [];
      for (var i = 1; i <= total; i++) r.push(i);
      return r;
    }
    var pages = [1];
    if (current > 3) pages.push('...');
    var lo = Math.max(2, current - 1);
    var hi = Math.min(total - 1, current + 1);
    for (var j = lo; j <= hi; j++) pages.push(j);
    if (current < total - 2) pages.push('...');
    pages.push(total);
    return pages;
  }

  function applyFilter(cat) {
    activeFilter = cat;
    filteredEntries = cat === 'all'
      ? allEntries.slice()
      : allEntries.filter(function (e) { return e.category === cat; });
    currentPage = 1;
  }

  function render() {
    renderGrid(filteredEntries, currentPage);
    renderPagination(filteredEntries.length, currentPage);
    // Update URL without reloading
    var params = [];
    if (currentPage > 1) params.push('page=' + currentPage);
    if (activeFilter !== 'all') params.push('cat=' + activeFilter);
    var newUrl = window.location.pathname + (params.length ? '?' + params.join('&') : '');
    if (window.history && window.history.replaceState) {
      window.history.replaceState(null, '', newUrl);
    }
  }

  // Read initial state from URL params
  function readParams() {
    var search = window.location.search;
    var pageMatch = search.match(/[?&]page=(\d+)/);
    var catMatch = search.match(/[?&]cat=([a-z-]+)/);
    currentPage = pageMatch ? Math.max(1, parseInt(pageMatch[1], 10)) : 1;
    activeFilter = catMatch ? catMatch[1] : 'all';
  }

  // Filter bar interaction
  document.querySelector('.news-filter-bar').addEventListener('click', function (e) {
    var btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('.filter-btn').forEach(function (b) { b.classList.remove('active'); });
    btn.classList.add('active');
    applyFilter(btn.dataset.cat);
    render();
  });

  // Pagination interaction (delegated, intercept clicks to avoid full reload)
  document.getElementById('newsPagination').addEventListener('click', function (e) {
    var btn = e.target.closest('[data-page]');
    if (!btn) return;
    e.preventDefault();
    currentPage = parseInt(btn.dataset.page, 10);
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  // Load news.json (this page is at game root, news.json is at news/news.json)
  readParams();
  fetch('news/news.json')
    .then(function (r) { return r.ok ? r.json() : null; })
    .then(function (data) {
      if (!data || !Array.isArray(data)) {
        document.getElementById('newsGrid').innerHTML =
          '<p class="news-empty">No news entries available yet.</p>';
        return;
      }
      allEntries = data;
      applyFilter(activeFilter);
      // Sync filter button state from URL
      document.querySelectorAll('.filter-btn').forEach(function (b) {
        b.classList.toggle('active', b.dataset.cat === activeFilter);
      });
      render();
    })
    .catch(function () {
      document.getElementById('newsGrid').innerHTML =
        '<p class="news-empty">Could not load news data.</p>';
    });
})();
</script>
</body>
</html>
