<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Emberveil — Auth Test (internal)</title>
  <style>
    :root { color-scheme: dark; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #14151a; color: #e7e7ea;
      margin: 0; padding: 1.5rem; max-width: 560px; margin-inline: auto;
    }
    h1 { font-size: 1.3rem; margin: 0 0 .25rem; }
    h2 { font-size: 1rem; margin: 1.5rem 0 .5rem; color: #9aa2b1; text-transform: uppercase; letter-spacing: .08em; }
    .note { color: #9aa2b1; font-size: .85rem; margin-bottom: 1rem; }
    .card { background: #1d1f27; border: 1px solid #2a2d37; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
    label { display: block; font-size: .85rem; color: #9aa2b1; margin: .5rem 0 .25rem; }
    input { width: 100%; box-sizing: border-box; background: #12131a; border: 1px solid #2a2d37; color: #e7e7ea; padding: .55rem .7rem; border-radius: 6px; font: inherit; }
    input:focus { outline: 2px solid #6b7bff; outline-offset: -1px; }
    button {
      background: #3a3f52; color: #e7e7ea; border: 0; padding: .55rem 1rem;
      border-radius: 6px; font: inherit; cursor: pointer; margin: .35rem .35rem 0 0;
    }
    button:hover { background: #4a5068; }
    button.primary { background: #5563e3; }
    button.primary:hover { background: #6b7bff; }
    button.google { background: #fff; color: #222; }
    button.google:hover { background: #eee; }
    button.danger { background: #8a3333; }
    button.danger:hover { background: #a54545; }
    pre { background: #0c0d12; border: 1px solid #2a2d37; border-radius: 6px; padding: .75rem; overflow: auto; font-size: .8rem; max-height: 360px; }
    .status { padding: .5rem .75rem; border-radius: 6px; margin-bottom: .75rem; font-size: .9rem; }
    .status.ok { background: #1b3a2a; color: #9fe6b3; }
    .status.err { background: #3a1b1b; color: #e6a0a0; }
    .status.info { background: #1b2b3a; color: #a0c8e6; }
    .muted { color: #6a717f; font-size: .8rem; }
    code { font-family: ui-monospace, Menlo, Consolas, monospace; }
  </style>
  <script type="module" crossorigin src="/RSG-Demos/game13/assets/authTest-C4wdwWlC.js"></script>
  <link rel="modulepreload" crossorigin href="/RSG-Demos/game13/assets/savesClient-DUFjgBxb.js">
</head>
<body>
  <h1>Emberveil — Auth Test</h1>
  <p class="note">Internal diagnostic page. Not linked from the game. <code>noindex</code> + robots-disallowed.</p>

  <div id="configStatus" class="status info">Checking Supabase configuration…</div>

  <h2>Session</h2>
  <div class="card">
    <div id="sessionStatus" class="muted">Loading…</div>
    <pre id="sessionJson">(none)</pre>
    <button id="btnSignOut" class="danger">Sign out</button>
    <button id="btnRefresh">Refresh session</button>
  </div>

  <h2>Email + Password</h2>
  <div class="card">
    <label for="email">Email</label>
    <input id="email" type="email" autocomplete="email" />
    <label for="password">Password</label>
    <input id="password" type="password" autocomplete="current-password" />
    <div style="margin-top:.5rem;">
      <button id="btnSignUp" class="primary">Sign up</button>
      <button id="btnSignIn" class="primary">Sign in</button>
      <button id="btnResend">Resend confirmation</button>
    </div>
    <div id="emailStatus" class="muted" style="margin-top:.5rem;"></div>
  </div>

  <h2>Google OAuth</h2>
  <div class="card">
    <button id="btnGoogle" class="google">Sign in with Google</button>
    <div id="googleStatus" class="muted" style="margin-top:.5rem;"></div>
  </div>

  <h2>Saves (Phase 2 — RLS test)</h2>
  <div class="card">
    <label for="slotName">Slot name</label>
    <input id="slotName" type="text" placeholder="e.g. rls-test-slot-1" />
    <label for="slotState">State (JSON) — defaults to a tiny payload if blank</label>
    <input id="slotState" type="text" placeholder='{"level":3,"hp":42}' />
    <div style="margin-top:.5rem;">
      <button id="btnSaveWrite" class="primary">Write / upsert</button>
      <button id="btnSaveRead">Read</button>
      <button id="btnSaveList">List my saves</button>
      <button id="btnSaveDelete" class="danger">Delete slot</button>
      <button id="btnSaveDeleteAll" class="danger">Delete all my saves</button>
    </div>
    <div id="savesStatus" class="muted" style="margin-top:.5rem;"></div>
    <pre id="savesOutput" style="margin-top:.5rem;">(no saves fetched yet)</pre>
  </div>

  <h2>Event log</h2>
  <div class="card">
    <pre id="log">(no events yet)</pre>
    <button id="btnClearLog">Clear</button>
  </div>

</body>
</html>
