<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Astral Crypts</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #0a0a0f;
      overflow: hidden;
      font-family: 'Courier New', monospace;
    }
    #game-container {
      position: relative;
      width: 100%;
      height: 100%;
    }
    #game-canvas-wrapper {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    #ui-root {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
    }
    #ui-root > * {
      pointer-events: auto;
    }
  </style>
  <script type="module" crossorigin src="./assets/main-BXYBdFnv.js"></script>
</head>
<body>
  <div id="game-container">
    <div id="game-canvas-wrapper"></div>
    <div id="ui-root"></div>
  </div>
</body>
</html>
