<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Rad's Game Demos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:16px}
body{background:#080810;color:#d4cce8;font-family:'Crimson Text',Georgia,serif;font-size:1.05rem;line-height:1.7;-webkit-font-smoothing:antialiased}

@keyframes particleRise{0%{transform:translateY(0) translateX(0) scale(1);opacity:.7}50%{transform:translateY(-40vh) translateX(var(--dx,20px)) scale(.8);opacity:.4}100%{transform:translateY(-90vh) translateX(var(--dx2,-10px)) scale(.3);opacity:0}}
@keyframes titlePulse{0%,100%{text-shadow:var(--gpf)}50%{text-shadow:var(--gpt)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes glowBorder{0%,100%{box-shadow:0 0 6px var(--glow),inset 0 0 6px rgba(0,0,0,.05)}50%{box-shadow:0 0 18px var(--glow),inset 0 0 12px rgba(0,0,0,.1)}}

.particle-field{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.particle{position:absolute;bottom:0;width:3px;height:3px;border-radius:50%;opacity:0;animation:particleRise linear infinite}

.site-header{position:sticky;top:0;z-index:100;background:rgba(8,8,16,.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(100,80,180,.2);padding:14px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.site-logo{font-family:'Cinzel',serif;font-size:.875rem;font-weight:700;letter-spacing:.25em;text-transform:uppercase;color:#c8c0e0}
.site-logo em{color:#8866cc;font-style:normal}
.sort-controls{display:flex;align-items:center;gap:8px}
.sort-label{font-family:'Cinzel',serif;font-size:.875rem;letter-spacing:.2em;text-transform:uppercase;color:#665588}
.sort-btn{font-family:'Cinzel',serif;font-size:.875rem;letter-spacing:.15em;text-transform:uppercase;padding:5px 14px;border-radius:2px;border:1px solid rgba(120,80,200,.25);background:transparent;color:#665588;cursor:pointer;transition:all .15s}
.sort-btn:hover{border-color:rgba(160,120,255,.5);color:#aa88dd}
.sort-btn.active{border-color:rgba(160,120,255,.6);color:#cc99ff;background:rgba(100,60,180,.15)}

.site-hero{min-height:48vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;position:relative;overflow:hidden;padding:80px 32px 60px;background:radial-gradient(ellipse 80% 60% at 50% 100%,rgba(80,40,160,.18) 0%,transparent 70%),linear-gradient(180deg,#06060e 0%,#080810 100%)}
.site-hero-inner{position:relative;z-index:2;max-width:700px}
.site-eyebrow{font-family:'Cinzel',serif;font-size:.875rem;letter-spacing:.45em;text-transform:uppercase;color:#8866cc;margin-bottom:20px;animation:fadeIn 1s ease .3s both}
.site-title{font-family:'Cinzel',serif;font-size:clamp(2.5rem,7vw,5rem);font-weight:900;color:#e8e0f8;letter-spacing:.08em;text-transform:uppercase;line-height:.95;animation:fadeUp .9s ease .5s both}
.site-title-sub{display:block;font-size:.4em;color:#9988bb;letter-spacing:.4em;margin-top:8px}
.site-divider{display:flex;align-items:center;gap:16px;margin:28px auto;animation:fadeIn 1s ease 1.1s both;max-width:380px}
.sdl{flex:1;height:1px}.sdl:first-child{background:linear-gradient(90deg,transparent,#553388)}.sdl:last-child{background:linear-gradient(90deg,#553388,transparent)}
.sdg{color:#8866cc;font-size:1rem}
.site-credit{font-family:'Crimson Text',serif;font-style:italic;font-size:1.2rem;color:#7766aa;animation:fadeIn 1s ease 1.3s both}
.site-credit strong{color:#9988cc;font-style:normal}

.games-list{display:flex;flex-direction:column}

.game-section{position:relative;min-height:100vh;display:flex;flex-direction:column;justify-content:center;overflow:hidden}
.game-bg{position:absolute;inset:0}
.game-bg-grad{position:absolute;inset:0}
.game-bg-shot{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.12;filter:blur(2px) saturate(.7)}
.game-outer{width:100%;padding:40px 24px;display:flex;flex-direction:column;align-items:center}

.game-frame{position:relative;z-index:2;max-width:860px;width:100%;padding:60px 48px 64px;border:1px solid var(--gbr);animation:glowBorder 6s ease-in-out 3s infinite}
.fc-tl,.fc-tr,.fc-bl,.fc-br{position:absolute;color:var(--gbr);font-size:1.1rem;line-height:1}
.fc-tl{top:-6px;left:-6px}.fc-tr{top:-6px;right:-6px}.fc-bl{bottom:-6px;left:-6px}.fc-br{bottom:-6px;right:-6px}
.frame-top,.frame-bot{position:absolute;left:50%;transform:translateX(-50%);font-family:'Cinzel',serif;text-transform:uppercase;background:var(--gbg);padding:0 14px;white-space:nowrap}
.frame-top{top:-.6em;font-size:.875rem;letter-spacing:.35em;color:var(--ga)}
.frame-bot{bottom:-.6em;font-size:.875rem;letter-spacing:.3em;color:var(--gtm);white-space:normal;text-align:center;width:max-content;max-width:calc(100% - 40px)}

.game-eyebrow{font-family:'Cinzel',serif;font-size:.875rem;letter-spacing:.4em;text-transform:uppercase;color:var(--ga);margin-bottom:18px;text-align:center;animation:fadeIn 1s ease .2s both}
.game-title{font-family:'Cinzel',serif;font-size:clamp(2.8rem,6vw,5.5rem);font-weight:900;color:var(--gbo);letter-spacing:.06em;text-transform:uppercase;line-height:.92;text-align:center;margin-bottom:28px;animation:fadeUp .9s ease .4s both,titlePulse 5s ease-in-out 2s infinite}
.divider{display:flex;align-items:center;gap:14px;margin:0 auto 28px;max-width:400px;width:100%;animation:fadeIn .8s ease .8s both}
.divider-line{flex:1;height:1px}.divider-line:first-child{background:linear-gradient(90deg,transparent,var(--gad))}.divider-line:last-child{background:linear-gradient(90deg,var(--gad),transparent)}
.divider-glyph{color:var(--ga);font-size:1rem}

.game-badges{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:24px;animation:fadeIn .8s ease 1s both}
.gbadge{font-family:'Cinzel',serif;font-size:.875rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:4px 14px;border-radius:2px}
.gbadge-m{background:rgba(0,0,0,.4);color:var(--gbo);border:1px solid var(--gbr)}
.gbadge-tok,.gbadge-date{background:rgba(0,0,0,.3);color:var(--gtm);border:1px solid rgba(120,100,80,.2)}

.game-desc{font-family:'Crimson Text',serif;font-style:italic;font-size:1.15rem;line-height:1.7;color:var(--gt);text-align:center;max-width:620px;margin:0 auto 28px;animation:fadeUp .8s ease 1.1s both}
.game-cta-row{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:14px;margin:0 auto 36px;animation:fadeIn .8s ease 1.3s both}
.play-btn{display:inline-block;font-family:'Cinzel',serif;font-size:.875rem;font-weight:700;letter-spacing:.3em;text-transform:uppercase;text-decoration:none;padding:14px 48px;border:1px solid var(--ga);color:var(--gbo);background:rgba(0,0,0,.5);transition:background .2s,box-shadow .2s,color .2s}
.play-btn:hover{background:var(--gad);color:#fff;box-shadow:0 0 24px var(--gg),0 0 48px var(--gg)}
.assets-btn{display:inline-block;font-family:'Inter','Segoe UI',sans-serif;font-size:.7rem;font-weight:600;letter-spacing:.22em;text-transform:uppercase;text-decoration:none;padding:10px 20px;border:1px solid rgba(255,255,255,.15);color:var(--gm);background:transparent;transition:color .2s,border-color .2s,background .2s}
.assets-btn:hover{color:var(--gbo);border-color:var(--ga);background:rgba(0,0,0,.3)}
.meta-sections{width:100%;max-width:860px;margin:0 auto;display:flex;flex-direction:column;gap:8px}
.meta-collapse{border:1px solid rgba(120,100,80,.2);background:rgba(0,0,0,.35)}
.meta-collapse summary{padding:10px 18px;cursor:pointer;list-style:none;font-family:'Cinzel',serif;font-size:.875rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gtm);display:flex;align-items:center;gap:8px;user-select:none}
.meta-collapse summary::before{content:'\2726\FE0E';font-size:.875rem;transition:transform .2s;color:var(--ga)}
.meta-collapse[open] summary::before{transform:rotate(90deg)}
.meta-collapse summary:hover{color:var(--gt)}
.meta-pre{font-family:'Crimson Text',serif;font-size:.95rem;line-height:1.75;color:var(--gt);white-space:pre-wrap;word-wrap:break-word;padding:4px 18px 18px}
.prompt-history{padding:4px 18px 18px;display:flex;flex-direction:column;gap:12px}
.prompt-first{font-family:'Crimson Text',serif;font-size:1rem;line-height:1.75;color:var(--gt);font-style:italic;border-left:2px solid var(--ga);padding-left:12px}
.prompt-entry{font-family:'Crimson Text',serif;font-size:.9rem;line-height:1.6;color:var(--gtm)}
.prompt-date{font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.15em;color:var(--ga);margin-right:8px}
.section-hr{height:2px;border:none;margin:0}

.site-footer{text-align:center;padding:40px 24px;font-family:'Cinzel',serif;font-size:.875rem;letter-spacing:.2em;text-transform:uppercase;color:#8866aa;border-top:1px solid rgba(80,50,130,.15)}

@media(max-width:640px){.game-frame{padding:40px 20px 48px}.game-title{font-size:2.2rem}.play-btn{padding:12px 28px}}
</style>
</head>
<body>
<header class="site-header">
  <div class="site-logo">Rad's <em>Game</em> Demos</div>
  <div class="sort-controls">
    <span class="sort-label">Sort</span>
    <button class="sort-btn active" id="sort-date" onclick="reSort('date')">Recent</button>
    <button class="sort-btn" id="sort-milestone" onclick="reSort('milestone')">Milestone</button>
    <button class="sort-btn" id="sort-title" onclick="reSort('title')">Title</button>
  </div>
</header>
<section class="site-hero">
  <div class="particle-field">
    <div class="particle" style="left:12%;animation-duration:8s;animation-delay:0s;--dx:15px;--dx2:-8px;background:#8855cc"></div>
    <div class="particle" style="left:30%;animation-duration:11s;animation-delay:2.5s;--dx:-20px;--dx2:12px;background:#6633aa;width:2px;height:2px"></div>
    <div class="particle" style="left:50%;animation-duration:7s;animation-delay:1s;--dx:25px;--dx2:-18px;background:#aa77ee;width:4px;height:4px"></div>
    <div class="particle" style="left:68%;animation-duration:9s;animation-delay:3.5s;--dx:-14px;--dx2:22px;background:#7744bb"></div>
    <div class="particle" style="left:82%;animation-duration:6.5s;animation-delay:0.8s;--dx:18px;--dx2:-12px;background:#9966dd;width:2px;height:2px"></div>
  </div>
  <div class="site-hero-inner">
    <div class="site-eyebrow">AI-Generated Game Demos</div>
    <h1 class="site-title">Rad's Game Demos<span class="site-title-sub">By Radley Sustaire &amp; Claude</span></h1>
    <div class="site-divider"><div class="sdl"></div><span class="sdg">✦&#xFE0E;</span><div class="sdl"></div></div>
    <p class="site-credit">Browser-playable games built milestone by milestone with <strong>Claude (Anthropic)</strong></p>
  </div>
</section>
<main class="games-list" id="games-list">

</main>
<footer class="site-footer">Rad's Game Demos &mdash; 0 games &mdash; 2026</footer>
<script>
const SORT_DATA=[];
function reSort(by){
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('sort-'+by).classList.add('active');
  const list=document.getElementById('games-list');
  const hrs=[...list.querySelectorAll('.section-hr')];
  const secs=[...list.querySelectorAll('.game-section')];
  const order=[...SORT_DATA].sort((a,b)=>{
    if(by==='date') return (b.sortTime||0)-(a.sortTime||0);
    if(by==='milestone') return b.milestone-a.milestone;
    if(by==='title') return a.title.localeCompare(b.title);
    return 0;
  });
  list.innerHTML='';
  order.forEach((d,i)=>{
    const sec=secs.find(s=>s.dataset.key===d.key);
    if(sec){list.appendChild(sec);if(i<order.length-1&&hrs[i])list.appendChild(hrs[i]);}
  });
}
</script>
</body></html>
