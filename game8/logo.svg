<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 100" role="img" aria-label="Vagrant and Ash">
  <defs>
    <style>
      @keyframes emberPulse {
        0%, 100% { opacity: 0.5; }
        50%       { opacity: 0.9; }
      }
      .ember-dot { animation: emberPulse 2.8s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Decorative left rule -->
  <line x1="18" y1="50" x2="60" y2="50" stroke="#8a8078" stroke-width="0.8" stroke-opacity="0.45"/>
  <line x1="18" y1="47" x2="18" y2="53" stroke="#8a8078" stroke-width="0.8" stroke-opacity="0.35"/>

  <!-- Ember diamond accent -->
  <polygon class="ember-dot" points="72,50 76,46 80,50 76,54" fill="#c7622a" opacity="0.75"/>

  <!-- Main title -->
  <text
    x="180" y="56"
    text-anchor="middle"
    font-family="'Palatino Linotype', 'Book Antiqua', Palatino, serif"
    font-size="34"
    font-weight="700"
    fill="#e8ddc8"
    letter-spacing="0.16em"
  >VAGRANT &amp; ASH</text>

  <!-- Ember diamond accent right -->
  <polygon class="ember-dot" points="280,50 284,46 288,50 284,54" fill="#c7622a" opacity="0.75"/>

  <!-- Decorative right rule -->
  <line x1="300" y1="50" x2="342" y2="50" stroke="#8a8078" stroke-width="0.8" stroke-opacity="0.45"/>
  <line x1="342" y1="47" x2="342" y2="53" stroke="#8a8078" stroke-width="0.8" stroke-opacity="0.35"/>

  <!-- Tagline -->
  <text
    x="180" y="78"
    text-anchor="middle"
    font-family="'Palatino Linotype', 'Book Antiqua', Georgia, serif"
    font-size="9"
    font-style="italic"
    fill="#8a8078"
    letter-spacing="0.06em"
    opacity="0.8"
  >A desperate journey across a dying continent.</text>
</svg>
