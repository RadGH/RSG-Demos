<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" role="img" aria-label="Vagrant and Ash">
  <defs>
    <style>
      @keyframes ashDrift1 {
        0%   { transform: translate(0, 0) rotate(0deg); opacity: 0; }
        10%  { opacity: 0.55; }
        85%  { opacity: 0.3; }
        100% { transform: translate(-18px, -90px) rotate(25deg); opacity: 0; }
      }
      @keyframes ashDrift2 {
        0%   { transform: translate(0, 0) rotate(0deg); opacity: 0; }
        10%  { opacity: 0.45; }
        85%  { opacity: 0.2; }
        100% { transform: translate(14px, -80px) rotate(-20deg); opacity: 0; }
      }
      @keyframes ashDrift3 {
        0%   { transform: translate(0, 0) rotate(0deg); opacity: 0; }
        15%  { opacity: 0.6; }
        85%  { opacity: 0.25; }
        100% { transform: translate(-22px, -100px) rotate(40deg); opacity: 0; }
      }
      @keyframes ashDrift4 {
        0%   { transform: translate(0, 0) rotate(0deg); opacity: 0; }
        12%  { opacity: 0.4; }
        85%  { opacity: 0.15; }
        100% { transform: translate(20px, -75px) rotate(-35deg); opacity: 0; }
      }
      @keyframes ashDrift5 {
        0%   { transform: translate(0, 0) rotate(0deg); opacity: 0; }
        10%  { opacity: 0.5; }
        85%  { opacity: 0.2; }
        100% { transform: translate(-10px, -88px) rotate(15deg); opacity: 0; }
      }
      @keyframes ashDrift6 {
        0%   { transform: translate(0, 0) rotate(0deg); opacity: 0; }
        10%  { opacity: 0.35; }
        85%  { opacity: 0.15; }
        100% { transform: translate(16px, -95px) rotate(-28deg); opacity: 0; }
      }

      @keyframes emberPulse {
        0%, 100% { opacity: 0.18; r: 72; }
        50%       { opacity: 0.48; r: 82; }
      }
      @keyframes emberPulseOuter {
        0%, 100% { opacity: 0.06; }
        50%       { opacity: 0.18; }
      }

      @keyframes monogramPulse {
        0%, 100% { opacity: 0.7; }
        50%       { opacity: 1; }
      }
      @keyframes monogramRotate {
        0%   { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes outerRingBreath {
        0%, 100% { stroke-opacity: 0.35; }
        50%       { stroke-opacity: 0.65; }
      }

      @keyframes titleReveal {
        from { opacity: 0; letter-spacing: 0.22em; }
        to   { opacity: 1; letter-spacing: 0.18em; }
      }
      @keyframes taglineFade {
        from { opacity: 0; transform: translateY(4px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes dividerExpand {
        from { transform: scaleX(0); opacity: 0; }
        to   { transform: scaleX(1); opacity: 1; }
      }
      @keyframes roadGlow {
        0%, 100% { stroke-opacity: 0.12; }
        50%       { stroke-opacity: 0.28; }
      }

      .ash1 { animation: ashDrift1 5.2s ease-in 0s infinite; }
      .ash2 { animation: ashDrift2 4.8s ease-in 0.9s infinite; }
      .ash3 { animation: ashDrift3 6.1s ease-in 0.4s infinite; }
      .ash4 { animation: ashDrift4 4.5s ease-in 1.6s infinite; }
      .ash5 { animation: ashDrift5 5.7s ease-in 2.1s infinite; }
      .ash6 { animation: ashDrift6 5.0s ease-in 0.7s infinite; }

      .ember-core  { animation: emberPulse 2.8s ease-in-out infinite; }
      .ember-outer { animation: emberPulseOuter 2.8s ease-in-out infinite; }

      .monogram-group { animation: monogramPulse 3.5s ease-in-out infinite; }
      .monogram-ring  {
        transform-origin: 200px 46px;
        animation: outerRingBreath 3.5s ease-in-out infinite;
      }

      .main-title {
        animation: titleReveal 1.4s cubic-bezier(0.22, 0.61, 0.36, 1) 0.2s both;
      }
      .divider-line {
        transform-origin: center;
        animation: dividerExpand 0.9s cubic-bezier(0.22, 0.61, 0.36, 1) 1.1s both;
      }
      .tagline {
        animation: taglineFade 1.6s ease 1.3s both;
      }
      .road-path {
        animation: roadGlow 4s ease-in-out 0.5s infinite;
      }
    </style>

    <!-- Vignette gradient -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#1a1714" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0d0b09" stop-opacity="0.85"/>
    </radialGradient>

    <!-- Ember glow radial gradient - placed behind title -->
    <radialGradient id="emberGlowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#c7622a" stop-opacity="0.9"/>
      <stop offset="35%"  stop-color="#9e2d2d" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#c7622a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="emberGlowOuter" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#c7622a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#c7622a" stop-opacity="0"/>
    </radialGradient>

    <!-- Road path fade gradient -->
    <linearGradient id="roadFade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#8a8078" stop-opacity="0"/>
      <stop offset="40%"  stop-color="#8a8078" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#8a8078" stop-opacity="0.08"/>
    </linearGradient>

    <!-- Ash texture overlay gradient -->
    <linearGradient id="ashGround" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#2d2926" stop-opacity="0"/>
      <stop offset="100%" stop-color="#2d2926" stop-opacity="0.6"/>
    </linearGradient>

    <!-- Clip for road convergence -->
    <clipPath id="centerClip">
      <rect x="100" y="155" width="200" height="50"/>
    </clipPath>
  </defs>

  <!-- ═══ BACKGROUND ═══ -->
  <rect width="400" height="220" fill="#1a1714"/>

  <!-- Subtle ash-ground at base -->
  <rect x="0" y="160" width="400" height="60" fill="url(#ashGround)"/>

  <!-- Distant horizon haze -->
  <rect x="0" y="140" width="400" height="30" fill="#1f1c19" opacity="0.4"/>

  <!-- ═══ BROKEN ROAD / PATH ═══ -->
  <!-- Road receding to vanishing point at center -->
  <g class="road-path">
    <!-- Left road edge -->
    <line x1="60" y1="220" x2="190" y2="168" stroke="#8a8078" stroke-width="1.2" stroke-opacity="0.18"/>
    <!-- Right road edge -->
    <line x1="340" y1="220" x2="210" y2="168" stroke="#8a8078" stroke-width="1.2" stroke-opacity="0.18"/>
    <!-- Center dashed line, broken -->
    <line x1="200" y1="220" x2="200" y2="170" stroke="#8a8078" stroke-width="0.8"
          stroke-dasharray="6 9" stroke-opacity="0.12"/>
  </g>

  <!-- Road surface cracks — static, decorative -->
  <g fill="none" stroke="#3d3830" stroke-width="0.7" opacity="0.5">
    <path d="M120 210 Q130 205 125 198"/>
    <path d="M270 207 Q278 202 274 195"/>
    <path d="M160 215 Q168 210 165 204"/>
    <path d="M235 212 Q242 207 240 201"/>
    <!-- Ash drifts/mounds on road edges -->
    <path d="M80 218 Q95 212 110 216" stroke="#4a4540" stroke-width="1.2"/>
    <path d="M290 216 Q308 210 325 214" stroke="#4a4540" stroke-width="1.2"/>
  </g>

  <!-- ═══ EMBER GLOW ═══ -->
  <!-- Outer ambient glow -->
  <ellipse class="ember-outer" cx="200" cy="130" rx="145" ry="55" fill="url(#emberGlowOuter)"/>
  <!-- Core ember glow behind title -->
  <circle class="ember-core" cx="200" cy="130" r="72" fill="url(#emberGlowGrad)"/>

  <!-- ═══ ASH PARTICLES ═══ -->
  <!-- Particles start near road/center and drift upward -->
  <g fill="#8a8078">
    <!-- Particle 1: diamond shape -->
    <polygon class="ash1" points="155,175 158,171 161,175 158,179" transform="scale(0.9)"/>
    <!-- Particle 2: small circle -->
    <circle class="ash2" cx="220" cy="178" r="1.5"/>
    <!-- Particle 3: tiny rectangle flake -->
    <rect class="ash3" x="173" y="182" width="3" height="1.5" rx="0.5"/>
    <!-- Particle 4: diamond -->
    <polygon class="ash4" points="245,172 248,168 251,172 248,176"/>
    <!-- Particle 5: small circle -->
    <circle class="ash5" cx="183" cy="185" r="1.2"/>
    <!-- Particle 6: tiny sliver -->
    <rect class="ash6" x="232" y="180" width="2" height="1" rx="0.3"/>
  </g>

  <!-- ═══ MONOGRAM EMBLEM ═══ -->
  <g class="monogram-group" transform="translate(200,46)">
    <!-- Broken outer ring: almost complete circle with two deliberate breaks -->
    <circle class="monogram-ring" cx="0" cy="0" r="20"
            fill="none" stroke="#8a8078" stroke-width="1.2"
            stroke-dasharray="22 5.2 22 8.4"
            stroke-dashoffset="0"/>
    <!-- Inner subtle glow ring -->
    <circle cx="0" cy="0" r="16" fill="none" stroke="#c7622a" stroke-width="0.5" stroke-opacity="0.3"/>
    <!-- Small ember dot at center of monogram -->
    <circle cx="0" cy="0" r="2.5" fill="#c7622a" opacity="0.6"/>

    <!-- "V" glyph — left arm of V -->
    <path d="M-9,-8 L0,10 L9,-8" fill="none" stroke="#e8ddc8" stroke-width="1.6"
          stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Crossbar ampersand-hint: small horizontal tick on V crosspiece -->
    <line x1="-4" y1="0" x2="4" y2="0" stroke="#c7622a" stroke-width="0.8" stroke-opacity="0.7"/>

    <!-- Decorative corner ticks at cardinal positions of ring -->
    <line x1="-23" y1="0" x2="-17" y2="0" stroke="#8a8078" stroke-width="0.8" stroke-opacity="0.5"/>
    <line x1="17"  y1="0" x2="23"  y2="0" stroke="#8a8078" stroke-width="0.8" stroke-opacity="0.5"/>
    <line x1="0" y1="-23" x2="0" y2="-17" stroke="#8a8078" stroke-width="0.8" stroke-opacity="0.5"/>
    <line x1="0" y1="17"  x2="0"  y2="23" stroke="#8a8078" stroke-width="0.8" stroke-opacity="0.5"/>
  </g>

  <!-- ═══ MAIN TITLE ═══ -->
  <text
    class="main-title"
    x="200" y="107"
    text-anchor="middle"
    font-family="'Palatino Linotype', 'Book Antiqua', Palatino, serif"
    font-size="31"
    font-weight="700"
    fill="#e8ddc8"
    letter-spacing="0.18em"
    style="text-shadow: none;"
  >VAGRANT &amp; ASH</text>

  <!-- Title shadow/echo for depth -->
  <text
    x="201" y="108.5"
    text-anchor="middle"
    font-family="'Palatino Linotype', 'Book Antiqua', Palatino, serif"
    font-size="31"
    font-weight="700"
    fill="#9e2d2d"
    letter-spacing="0.18em"
    opacity="0.18"
    aria-hidden="true"
  >VAGRANT &amp; ASH</text>

  <!-- ═══ DECORATIVE DIVIDER ═══ -->
  <g class="divider-line" transform="translate(200,118)">
    <!-- Main line segments with gap at center -->
    <line x1="-110" y1="0" x2="-14" y2="0" stroke="#8a8078" stroke-width="0.7" stroke-opacity="0.5"/>
    <line x1="14"   y1="0" x2="110"  y2="0" stroke="#8a8078" stroke-width="0.7" stroke-opacity="0.5"/>
    <!-- Ember diamond at center of divider -->
    <polygon points="0,-4 5,0 0,4 -5,0" fill="#c7622a" opacity="0.7"/>
    <!-- Small ticks at ends -->
    <line x1="-110" y1="-3" x2="-110" y2="3" stroke="#8a8078" stroke-width="0.7" stroke-opacity="0.4"/>
    <line x1="110"  y1="-3" x2="110"  y2="3" stroke="#8a8078" stroke-width="0.7" stroke-opacity="0.4"/>
    <!-- Secondary decorative dots -->
    <circle cx="-80" cy="0" r="0.8" fill="#8a8078" opacity="0.4"/>
    <circle cx="80"  cy="0" r="0.8" fill="#8a8078" opacity="0.4"/>
  </g>

  <!-- ═══ TAGLINE ═══ -->
  <text
    class="tagline"
    x="200" y="144"
    text-anchor="middle"
    font-family="'Palatino Linotype', 'Book Antiqua', Palatino, Georgia, serif"
    font-size="9.5"
    font-style="italic"
    fill="#8a8078"
    letter-spacing="0.04em"
  >The road remembers everyone who walked it.</text>

  <!-- ═══ VIGNETTE OVERLAY ═══ -->
  <rect width="400" height="220" fill="url(#vignette)" pointer-events="none"/>
</svg>
